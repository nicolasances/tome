<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tome — Practice Complete</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Comfortaa','Poppins',system-ui,sans-serif; background: #f0eee9; overflow: hidden; }
  #root { height: 100%; }

  /* entrance motion — plays on load (rings/bars use JS-driven CSS transitions) */
  @keyframes pc-rise  { from { transform: translateY(10px); } to { transform: none; } }
  @keyframes pc-pop   { from { transform: scale(0.35); } to { transform: scale(1); } }
  @keyframes pc-scrim { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pc-sheet { from { opacity: 0; transform: translateY(14px) scale(0.97); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#00acc1">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#00acc1"/>
      <circle cx="600" cy="360" r="120" fill="#bef264"/>
      <path d="M558 360 l30 30 l58 -64" fill="none" stroke="#164e63" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="450" y="540" width="300" height="20" rx="10" fill="rgba(0,0,0,0.15)"/>
      <rect x="450" y="540" width="210" height="20" rx="10" fill="#bef264"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="assets/icons.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tome-kit.jsx"></script>
  <script type="text/babel" src="exercise-screens.jsx"></script>
  <script type="text/babel" src="practice-complete-screens.jsx"></script>
  <script type="text/babel" src="annotations.jsx"></script>
  <script type="text/babel" src="practice-complete-app.jsx"></script>
</body>
</html>
