<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tome — Language Learning (Desktop)</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Comfortaa','Poppins',system-ui,sans-serif; background: #00acc1; overflow: hidden; }
  #root { height: 100%; }

  /* universal press feedback — the Toto signature */
  .tpress { transition: transform 100ms cubic-bezier(0.22,1,0.36,1); }
  .tpress:active { transform: scale(0.97); }
  .link-btn:hover { opacity: 0.7; }

  /* scrollable main — hidden scrollbar, Toto 'no-scrollbar' feel */
  .tome-main::-webkit-scrollbar { width: 10px; }
  .tome-main::-webkit-scrollbar-thumb { background: rgba(0,68,80,0.35); border-radius: 9999px; }
  .tome-main::-webkit-scrollbar-track { background: transparent; }

  /* ── Responsive: desktop-optimized, graceful down to ~1024px ── */
  @media (max-width: 1180px) {
    .upnext-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 1080px) {
    /* collapse sidebar to an icon rail */
    .tome-sidebar { width: 76px !important; padding-left: 12px !important; padding-right: 12px !important; }
    .tome-sidebar .nav-label, .tome-sidebar .brand-text { display: none !important; }
    .tome-sidebar .brand-row { justify-content: center; }
    .tome-sidebar .side-badge { justify-content: center; padding-left: 0 !important; padding-right: 0 !important; }
    .map-grid { grid-template-columns: repeat(3, 1fr) !important; }
  }
  @media (max-width: 920px) {
    .home-grid { grid-template-columns: 1fr !important; }
    .stat-grid { grid-template-columns: 1fr !important; }
    .flow-grid { grid-template-columns: 1fr !important; }
    .map-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#00acc1">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

      <rect x="120" y="160" width="200" height="480" rx="20" fill="rgba(0,68,80,0.25)"/>
      <circle cx="220" cy="250" r="34" fill="none" stroke="#d9f99d" stroke-width="7"/>
      <text x="220" y="262" font-family="Comfortaa, sans-serif" font-size="30" font-weight="700" fill="rgba(0,0,0,0.8)" text-anchor="middle">A1</text>
      <rect x="380" y="200" width="700" height="200" rx="22" fill="#155e75"/>
      <text x="410" y="290" font-family="Comfortaa, sans-serif" font-size="44" font-weight="700" fill="#fff">Who Are You?</text>
      <rect x="410" y="330" width="420" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
      <rect x="410" y="330" width="150" height="14" rx="7" fill="#bef264"/>
      <rect x="380" y="440" width="220" height="200" rx="18" fill="rgba(14,116,144,0.4)"/>
      <rect x="630" y="440" width="220" height="200" rx="18" fill="rgba(14,116,144,0.4)"/>
      <rect x="880" y="440" width="200" height="200" rx="18" fill="rgba(14,116,144,0.4)"/>
    </svg>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
